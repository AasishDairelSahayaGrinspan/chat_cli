name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            artifact: chat-cli-linux-x86_64
          - os: ubuntu-22.04-arm
            name: linux-arm64
            artifact: chat-cli-linux-arm64
          - os: macos-14
            name: macos-arm64
            artifact: chat-cli-macos-arm64
          - os: windows-2022
            name: windows-x86_64
            artifact: chat-cli-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ── Linux dependencies ──
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libsqlite3-dev libsodium-dev

      # ── macOS dependencies ──
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 sqlite libsodium pkg-config cmake

      # ── Windows dependencies (vcpkg) ──
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows sqlite3:x64-windows libsodium:x64-windows

      # ── Configure & Build ──
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          OPENSSL_DIR="$(brew --prefix openssl@3)"
          SQLITE_DIR="$(brew --prefix sqlite)"
          SODIUM_DIR="$(brew --prefix libsodium)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$OPENSSL_DIR" \
            -DCMAKE_PREFIX_PATH="$OPENSSL_DIR;$SQLITE_DIR;$SODIUM_DIR"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Package ──
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp build/server/chat_server dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp build/client/chat_client dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md dist/${{ matrix.artifact }}/
          cp -r docker/certs dist/${{ matrix.artifact }}/certs-generator 2>/dev/null || true
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }}
          # Release builds with multi-config generators put binaries in Release/
          $serverPaths = @("build/server/Release/chat_server.exe", "build/server/chat_server.exe")
          $clientPaths = @("build/client/Release/chat_client.exe", "build/client/chat_client.exe")
          foreach ($p in $serverPaths) { if (Test-Path $p) { Copy-Item $p dist/${{ matrix.artifact }}/ ; break } }
          foreach ($p in $clientPaths) { if (Test-Path $p) { Copy-Item $p dist/${{ matrix.artifact }}/ ; break } }
          Copy-Item README.md dist/${{ matrix.artifact }}/
          # Copy vcpkg DLLs needed at runtime
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem "$vcpkgBin/*.dll" | ForEach-Object { Copy-Item $_.FullName dist/${{ matrix.artifact }}/ }
          }
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
